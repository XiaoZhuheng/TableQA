<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格质量分析工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #333;
        }
        
        .header p {
            font-size: 1.1em;
            color: #666;
        }
        
        .upload-area {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            border: 3px dashed #667eea;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            transform: translateY(-2px);
        }
        
        .upload-area.dragover {
            background: #f0f4ff;
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
            color: #667eea;
        }
        
        .upload-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
        }
        
        .upload-hint {
            color: #666;
            font-size: 0.95em;
        }
        
        .file-input {
            display: none;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .results {
            display: none;
        }
        
        .score-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
            transition: background 0.5s ease;
        }
        
        .score-card.excellent { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); }
        .score-card.good { background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); }
        .score-card.warning { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); }
        .score-card.poor { background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%); }
        .score-card.critical { background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%); }
        
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: bold;
            color: white;
            position: relative;
        }
        
        .score-excellent { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .score-good { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .score-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .score-poor { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .score-critical { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); }
        
        .score-label {
            font-size: 1.2em;
            color: #666;
            margin-top: 10px;
        }
        
        .issues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .issue-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            border-left: 5px solid;
        }
        
        .issue-card.critical { border-left-color: #ff416c; }
        .issue-card.warning { border-left-color: #f5576c; }
        .issue-card.info { border-left-color: #667eea; }
        .issue-card.success { border-left-color: #38ef7d; }
        
        .issue-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .issue-icon {
            font-size: 1.3em;
        }
        
        .issue-content {
            color: #555;
            line-height: 1.6;
        }
        
        .issue-detail {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        .stats-table th,
        .stats-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .stats-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        
        .stats-table tr:hover {
            background: #f8f9fa;
        }
        
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 500;
        }
        
        .badge-danger { background: #ffe6e6; color: #dc3545; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        
        .preview-section {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        
        .preview-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        .preview-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
            overflow-x: auto;
            display: block;
        }
        
        .preview-table th,
        .preview-table td {
            padding: 8px 12px;
            border: 1px solid #ddd;
            text-align: left;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .preview-table th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }
        
        .preview-table tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        .preview-table tr:hover {
            background: #e9ecef;
        }
        
        .preview-table .unnamed {
            background: #fff3cd !important;
            color: #856404;
        }
        
        .preview-table .empty-cell {
            background: #ffe6e6 !important;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .file-info {
            background: #e3f2fd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .file-name {
            font-weight: bold;
            color: #1976d2;
        }
        
        .file-meta {
            color: #666;
            font-size: 0.9em;
        }
        
        .suggestion-box {
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: #2e7d32;
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
        }
        
        .suggestion-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .suggestion-list {
            list-style: none;
        }
        
        .suggestion-list li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }
        
        .suggestion-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            font-weight: bold;
            color: #2e7d32;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .progress-excellent { background: linear-gradient(90deg, #11998e, #38ef7d); }
        .progress-good { background: linear-gradient(90deg, #667eea, #764ba2); }
        .progress-warning { background: linear-gradient(90deg, #f093fb, #f5576c); }
        .progress-poor { background: linear-gradient(90deg, #fa709a, #fee140); }
        .progress-critical { background: linear-gradient(90deg, #ff416c, #ff4b2b); }
        
        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mode-btn {
            padding: 10px 25px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .mode-btn:hover {
            background: #f0f4ff;
        }
        
        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .batch-results {
            display: none;
        }
        
        .batch-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
        }
        
        .batch-table th,
        .batch-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .batch-table th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }
        
        .batch-table tr:hover {
            background: #f8f9fa;
        }
        
        .batch-table .score-cell {
            font-weight: bold;
        }
        
        .batch-table .score-excellent { color: #11998e; }
        .batch-table .score-good { color: #667eea; }
        .batch-table .score-warning { color: #f5576c; }
        .batch-table .score-poor { color: #fa709a; }
        .batch-table .score-critical { color: #ff416c; }
        
        .batch-table .issues-cell {
            max-width: 300px;
            font-size: 0.85em;
            color: #666;
        }
        
        .batch-summary {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .summary-item {
            text-align: center;
        }
        
        .summary-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .summary-label {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 表格质量分析工具</h1>
            <p>上传 Excel 或 CSV 文件，自动检测表格质量问题</p>
        </div>
        
        <div class="mode-switch">
            <button class="mode-btn active" id="singleModeBtn" onclick="switchMode('single')">单个文件分析</button>
            <button class="mode-btn" id="batchModeBtn" onclick="switchMode('batch')">批量文件检测</button>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text" id="uploadText">点击或拖拽文件到此处</div>
            <div class="upload-hint" id="uploadHint">支持 .xlsx, .xls, .csv 格式</div>
            <button class="btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
            <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls,.csv">
        </div>
        
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p id="loadingText">正在分析表格质量...</p>
        </div>
        
        <div class="results" id="results">
            <div class="file-info" id="fileInfo"></div>
            
            <div class="score-card">
                <div class="score-circle" id="scoreCircle">
                    <span id="scoreValue">--</span>
                </div>
                <div class="score-label" id="scoreLabel">等待分析</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="issues-grid" id="issuesGrid"></div>
            
            <div class="suggestion-box" id="suggestionBox" style="display: none;">
                <div class="suggestion-title">💡 优化建议</div>
                <ul class="suggestion-list" id="suggestionList"></ul>
            </div>
            
            <div class="preview-section" id="previewSection">
                <div class="preview-title">📋 数据预览（前10行）</div>
                <div style="overflow-x: auto;">
                    <table class="preview-table" id="previewTable"></table>
                </div>
            </div>
        </div>
        
        <div class="batch-results" id="batchResults">
            <div class="batch-summary" id="batchSummary"></div>
            <table class="batch-table" id="batchTable">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>文件名</th>
                        <th>行数</th>
                        <th>列数</th>
                        <th>评分</th>
                        <th>等级</th>
                        <th>问题数量</th>
                        <th>主要问题</th>
                    </tr>
                </thead>
                <tbody id="batchTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const batchResults = document.getElementById('batchResults');
        
        let currentMode = 'single';
        
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('singleModeBtn').classList.toggle('active', mode === 'single');
            document.getElementById('batchModeBtn').classList.toggle('active', mode === 'batch');
            
            const uploadText = document.getElementById('uploadText');
            const uploadHint = document.getElementById('uploadHint');
            
            if (mode === 'single') {
                uploadText.textContent = '点击或拖拽文件到此处';
                uploadHint.textContent = '支持 .xlsx, .xls, .csv 格式';
                fileInput.removeAttribute('multiple');
            } else {
                uploadText.textContent = '点击或拖拽多个文件到此处';
                uploadHint.textContent = '支持批量上传 .xlsx, .xls, .csv 文件';
                fileInput.setAttribute('multiple', 'multiple');
            }
            
            results.style.display = 'none';
            batchResults.style.display = 'none';
        }
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                if (currentMode === 'single') {
                    handleFile(files[0]);
                } else {
                    handleBatchFiles(Array.from(files));
                }
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                if (currentMode === 'single') {
                    handleFile(e.target.files[0]);
                } else {
                    handleBatchFiles(Array.from(e.target.files));
                }
            }
        });
        
        function handleFile(file) {
            const validTypes = ['.xlsx', '.xls', '.csv'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();
            
            if (!validTypes.includes(ext)) {
                alert('请上传 Excel (.xlsx, .xls) 或 CSV 文件');
                return;
            }
            
            loading.style.display = 'block';
            results.style.display = 'none';
            batchResults.style.display = 'none';
            
            const reader = new FileReader();
            
            reader.onload = (e) => {
                try {
                    let data;
                    if (ext === '.csv') {
                        const text = e.target.result;
                        data = parseCSV(text);
                    } else {
                        const workbook = XLSX.read(e.target.result, { type: 'binary' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        data = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
                    }
                    
                    setTimeout(() => {
                        analyzeQuality(data, file);
                        loading.style.display = 'none';
                        results.style.display = 'block';
                    }, 300);
                } catch (err) {
                    alert('文件解析失败: ' + err.message);
                    loading.style.display = 'none';
                }
            };
            
            if (ext === '.csv') {
                reader.readAsText(file);
            } else {
                reader.readAsBinaryString(file);
            }
        }
        
        async function handleBatchFiles(files) {
            const validTypes = ['.xlsx', '.xls', '.csv'];
            const validFiles = files.filter(f => {
                const ext = '.' + f.name.split('.').pop().toLowerCase();
                return validTypes.includes(ext);
            });
            
            if (validFiles.length === 0) {
                alert('请上传 Excel (.xlsx, .xls) 或 CSV 文件');
                return;
            }
            
            loading.style.display = 'block';
            document.getElementById('loadingText').textContent = `正在分析 ${validFiles.length} 个文件...`;
            results.style.display = 'none';
            batchResults.style.display = 'none';
            
            const batchData = [];
            
            for (let i = 0; i < validFiles.length; i++) {
                const file = validFiles[i];
                document.getElementById('loadingText').textContent = `正在分析 (${i + 1}/${validFiles.length}): ${file.name}`;
                
                try {
                    const data = await readFileAsync(file);
                    const analysis = analyzeQualityBatch(data, file);
                    batchData.push(analysis);
                } catch (err) {
                    batchData.push({
                        fileName: file.name,
                        rowCount: 0,
                        colCount: 0,
                        score: 0,
                        level: '解析失败',
                        issueCount: 0,
                        mainIssues: [err.message]
                    });
                }
            }
            
            displayBatchResults(batchData);
            loading.style.display = 'none';
            batchResults.style.display = 'block';
        }
        
        function readFileAsync(file) {
            return new Promise((resolve, reject) => {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    try {
                        let data;
                        if (ext === '.csv') {
                            data = parseCSV(e.target.result);
                        } else {
                            const workbook = XLSX.read(e.target.result, { type: 'binary' });
                            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                            data = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
                        }
                        resolve(data);
                    } catch (err) {
                        reject(err);
                    }
                };
                
                reader.onerror = () => reject(new Error('文件读取失败'));
                
                if (ext === '.csv') {
                    reader.readAsText(file);
                } else {
                    reader.readAsBinaryString(file);
                }
            });
        }
        
        function analyzeQualityBatch(data, file) {
            const issues = [];
            const rowCount = data.length;
            const colCount = data.length > 0 ? Math.max(...data.map(row => row.length)) : 0;
            
            let headerRowIndex = 0;
            for (let i = 0; i < Math.min(10, data.length); i++) {
                const nonEmptyCells = data[i].filter(cell => cell !== '' && cell !== null && cell !== undefined).length;
                if (nonEmptyCells > 0) {
                    headerRowIndex = i;
                    break;
                }
            }
            
            const headers = data[headerRowIndex] || [];
            const dataRows = data.slice(headerRowIndex + 1);
            
            const unnamedCols = [];
            headers.forEach((h, i) => {
                const headerStr = String(h || '');
                if (headerStr.includes('Unnamed') || headerStr === '' || headerStr === 'undefined' || headerStr === 'null') {
                    unnamedCols.push({ index: i, name: headerStr || '(空)' });
                }
            });
            if (unnamedCols.length > 0) issues.push(`不规范列名(${unnamedCols.length}个)`);
            
            const emptyRows = [];
            dataRows.forEach((row, i) => {
                const nonEmpty = row.filter(cell => cell !== '' && cell !== null && cell !== undefined).length;
                if (nonEmpty === 0) emptyRows.push(i);
            });
            if (emptyRows.length > 0) issues.push(`空行(${emptyRows.length}个)`);
            
            let totalCells = 0;
            let emptyCells = 0;
            const colEmptyCounts = new Array(headers.length).fill(0);
            
            dataRows.forEach(row => {
                row.forEach((cell, i) => {
                    totalCells++;
                    if (cell === '' || cell === null || cell === undefined) {
                        emptyCells++;
                        if (i < colEmptyCounts.length) colEmptyCounts[i]++;
                    }
                });
            });
            
            const emptyRate = totalCells > 0 ? emptyCells / totalCells : 0;
            if (emptyRate > 0.3) issues.push(`空值过多(${(emptyRate * 100).toFixed(1)}%)`);
            
            const emptyCols = [];
            colEmptyCounts.forEach((count, i) => {
                if (count === dataRows.length && dataRows.length > 0) {
                    emptyCols.push({ index: i, name: headers[i] || `第${i + 1}列` });
                }
            });
            if (emptyCols.length > 0) issues.push(`空列(${emptyCols.length}个)`);
            
            if (headerRowIndex > 0) issues.push(`表头偏移(${headerRowIndex}行)`);
            
            const headerStrs = headers.map(h => String(h || '').trim());
            const duplicates = [];
            const seen = new Set();
            headerStrs.forEach((h, i) => {
                if (h && seen.has(h)) duplicates.push({ name: h, index: i });
                seen.add(h);
            });
            if (duplicates.length > 0) issues.push(`重复列名(${duplicates.length}个)`);
            
            const typeIssues = [];
            headers.forEach((header, colIndex) => {
                const values = dataRows.map(row => row[colIndex]).filter(v => v !== '' && v !== null && v !== undefined);
                if (values.length > 0) {
                    const types = new Set();
                    values.slice(0, 100).forEach(v => {
                        const str = String(v).trim();
                        if (!isNaN(str) && str !== '') types.add('number');
                        else if (/^\d{4}[-/]\d{1,2}[-/]\d{1,2}/.test(str)) types.add('date');
                        else types.add('text');
                    });
                    if (types.size > 1) typeIssues.push({ col: header || `第${colIndex + 1}列` });
                }
            });
            if (typeIssues.length > 0) issues.push(`数据类型混合(${typeIssues.length}列)`);
            
            const rowStrings = dataRows.map(row => JSON.stringify(row));
            const uniqueRows = new Set(rowStrings);
            const duplicateCount = dataRows.length - uniqueRows.size;
            if (duplicateCount > 0) issues.push(`重复行(${duplicateCount}个)`);
            
            const nonEmptyCols = colEmptyCounts.filter(c => c < dataRows.length).length;
            if (nonEmptyCols === 1 && colCount > 1) issues.push('数据结构异常');
            
            const rowLengths = data.map(row => row.length);
            const uniqueLengths = new Set(rowLengths);
            if (uniqueLengths.size > 1) issues.push('行长度不一致');
            
            let score = 100;
            score -= unnamedCols.length * 15;
            score -= emptyRows.length * 5;
            score -= emptyRate * 50;
            score -= emptyCols.length * 10;
            score -= headerRowIndex * 8;
            score -= duplicates.length * 8;
            score -= duplicateCount * 3;
            score -= typeIssues.length * 3;
            if (uniqueLengths.size > 1) score -= 5;
            if (nonEmptyCols === 1 && colCount > 1) score -= 30;
            score = Math.max(0, Math.min(100, score));
            
            let level, scoreClass;
            if (score >= 95) { level = '优秀'; scoreClass = 'excellent'; }
            else if (score >= 80) { level = '良好'; scoreClass = 'good'; }
            else if (score >= 60) { level = '一般'; scoreClass = 'warning'; }
            else if (score >= 40) { level = '较差'; scoreClass = 'poor'; }
            else { level = '严重'; scoreClass = 'critical'; }
            
            return {
                fileName: file.name,
                rowCount: rowCount,
                colCount: colCount,
                score: Math.round(score),
                level: level,
                scoreClass: scoreClass,
                issueCount: issues.length,
                mainIssues: issues.slice(0, 3)
            };
        }
        
        function displayBatchResults(batchData) {
            const tbody = document.getElementById('batchTableBody');
            tbody.innerHTML = batchData.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.fileName}</td>
                    <td>${item.rowCount}</td>
                    <td>${item.colCount}</td>
                    <td class="score-cell score-${item.scoreClass}">${item.score}</td>
                    <td>${item.level}</td>
                    <td>${item.issueCount}</td>
                    <td class="issues-cell">${item.mainIssues.length > 0 ? item.mainIssues.join('、') : '无'}</td>
                </tr>
            `).join('');
            
            const totalFiles = batchData.length;
            const avgScore = Math.round(batchData.reduce((sum, item) => sum + item.score, 0) / totalFiles);
            const excellentCount = batchData.filter(item => item.score >= 95).length;
            const poorCount = batchData.filter(item => item.score < 60).length;
            
            document.getElementById('batchSummary').innerHTML = `
                <div class="summary-item">
                    <div class="summary-value">${totalFiles}</div>
                    <div class="summary-label">文件总数</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value">${avgScore}</div>
                    <div class="summary-label">平均评分</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" style="color: #11998e;">${excellentCount}</div>
                    <div class="summary-label">优秀文件</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" style="color: #ff416c;">${poorCount}</div>
                    <div class="summary-label">需优化文件</div>
                </div>
            `;
        }
        
        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                const result = [];
                let current = '';
                let inQuotes = false;
                
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        if (inQuotes && line[i + 1] === '"') {
                            current += '"';
                            i++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result;
            }).filter(row => row.some(cell => cell !== ''));
        }
        
        function analyzeQuality(data, file) {
            const issues = [];
            const suggestions = [];
            
            // 基本信息
            const rowCount = data.length;
            const colCount = data.length > 0 ? Math.max(...data.map(row => row.length)) : 0;
            
            // 检测表头行（寻找第一个非空行作为表头）
            let headerRowIndex = 0;
            for (let i = 0; i < Math.min(10, data.length); i++) {
                const nonEmptyCells = data[i].filter(cell => cell !== '' && cell !== null && cell !== undefined).length;
                if (nonEmptyCells > 0) {
                    headerRowIndex = i;
                    break;
                }
            }
            
            const headers = data[headerRowIndex] || [];
            const dataRows = data.slice(headerRowIndex + 1);
            
            // 1. 检测不规范列名 (Unnamed)
            const unnamedCols = [];
            headers.forEach((h, i) => {
                const headerStr = String(h || '');
                if (headerStr.includes('Unnamed') || headerStr === '' || headerStr === 'undefined' || headerStr === 'null') {
                    unnamedCols.push({ index: i, name: headerStr || '(空)' });
                }
            });
            
            if (unnamedCols.length > 0) {
                issues.push({
                    type: 'critical',
                    title: '⚠️ 不规范的列名',
                    content: `发现 ${unnamedCols.length} 个不规范的列名，这通常是由于合并单元格或表头不在第一行导致的。`,
                    detail: `问题列: ${unnamedCols.slice(0, 10).map(c => `第${c.index + 1}列(${c.name})`).join(', ')}${unnamedCols.length > 10 ? '...' : ''}`
                });
                suggestions.push('删除或重命名所有"Unnamed"列，确保每列都有明确的标题');
                suggestions.push('检查原始表格，取消合并单元格');
            }
            
            // 2. 检测空行
            const emptyRows = [];
            dataRows.forEach((row, i) => {
                const nonEmpty = row.filter(cell => cell !== '' && cell !== null && cell !== undefined).length;
                if (nonEmpty === 0) {
                    emptyRows.push(i + headerRowIndex + 2);
                }
            });
            
            if (emptyRows.length > 0) {
                issues.push({
                    type: emptyRows.length > dataRows.length * 0.3 ? 'critical' : 'warning',
                    title: '📭 空行问题',
                    content: `发现 ${emptyRows.length} 个空行，占比 ${(emptyRows.length / Math.max(dataRows.length, 1) * 100).toFixed(1)}%。`,
                    detail: `空行位置: 第 ${emptyRows.slice(0, 10).join(', ')} 行${emptyRows.length > 10 ? '...' : ''}`
                });
                suggestions.push('删除表格中的空行，保持数据连续性');
            }
            
            // 3. 检测空值
            let totalCells = 0;
            let emptyCells = 0;
            const colEmptyCounts = new Array(headers.length).fill(0);
            
            dataRows.forEach(row => {
                row.forEach((cell, i) => {
                    totalCells++;
                    if (cell === '' || cell === null || cell === undefined) {
                        emptyCells++;
                        if (i < colEmptyCounts.length) {
                            colEmptyCounts[i]++;
                        }
                    }
                });
            });
            
            const emptyRate = totalCells > 0 ? emptyCells / totalCells : 0;
            
            if (emptyRate > 0.3) {
                issues.push({
                    type: emptyRate > 0.6 ? 'critical' : 'warning',
                    title: '🕳️ 空值过多',
                    content: `空值占比 ${(emptyRate * 100).toFixed(1)}%，共 ${emptyCells} 个空单元格。`,
                    detail: '空值过多的列可能导致数据分析结果不准确'
                });
                suggestions.push('补充缺失的数据，或使用适当的方法填充空值');
            }
            
            // 4. 检测完全为空的列
            const emptyCols = [];
            colEmptyCounts.forEach((count, i) => {
                if (count === dataRows.length && dataRows.length > 0) {
                    emptyCols.push({ index: i, name: headers[i] || `第${i + 1}列` });
                }
            });
            
            if (emptyCols.length > 0) {
                issues.push({
                    type: 'warning',
                    title: '📭 空列问题',
                    content: `发现 ${emptyCols.length} 个完全为空的列。`,
                    detail: emptyCols.slice(0, 5).map(c => c.name).join(', ') + (emptyCols.length > 5 ? '...' : '')
                });
                suggestions.push('删除完全为空的列');
            }
            
            // 5. 检测表头偏移（表头不在第一行）
            if (headerRowIndex > 0) {
                issues.push({
                    type: 'warning',
                    title: '📍 表头位置偏移',
                    content: `表头不在第一行，实际从第 ${headerRowIndex + 1} 行开始。`,
                    detail: '这通常是由于表格顶部有标题或说明文字导致的'
                });
                suggestions.push('删除表格顶部的多余行，确保表头在第一行');
            }
            
            // 6. 检测重复列名
            const headerStrs = headers.map(h => String(h || '').trim());
            const duplicates = [];
            const seen = new Set();
            headerStrs.forEach((h, i) => {
                if (h && seen.has(h)) {
                    duplicates.push({ name: h, index: i });
                }
                seen.add(h);
            });
            
            if (duplicates.length > 0) {
                issues.push({
                    type: 'warning',
                    title: '🔁 重复列名',
                    content: `发现 ${duplicates.length} 个重复的列名。`,
                    detail: duplicates.slice(0, 5).map(d => `${d.name}(第${d.index + 1}列)`).join(', ')
                });
                suggestions.push('重命名重复的列名，确保每列名称唯一');
            }
            
            // 7. 检测数据类型不一致
            const typeIssues = [];
            headers.forEach((header, colIndex) => {
                const values = dataRows.map(row => row[colIndex]).filter(v => v !== '' && v !== null && v !== undefined);
                if (values.length > 0) {
                    const types = new Set();
                    values.slice(0, 100).forEach(v => {
                        const str = String(v).trim();
                        if (!isNaN(str) && str !== '') {
                            types.add('number');
                        } else if (/^\d{4}[-/]\d{1,2}[-/]\d{1,2}/.test(str)) {
                            types.add('date');
                        } else {
                            types.add('text');
                        }
                    });
                    
                    if (types.size > 1) {
                        typeIssues.push({ col: header || `第${colIndex + 1}列`, types: Array.from(types) });
                    }
                }
            });
            
            if (typeIssues.length > 0) {
                issues.push({
                    type: 'info',
                    title: '🔤 数据类型混合',
                    content: `发现 ${typeIssues.length} 列包含混合数据类型。`,
                    detail: typeIssues.slice(0, 5).map(t => `${t.col}: ${t.types.join(', ')}`).join('; ')
                });
                suggestions.push('统一每列的数据类型，避免数字和文本混用');
            }
            
            // 8. 检测重复行
            const rowStrings = dataRows.map(row => JSON.stringify(row));
            const uniqueRows = new Set(rowStrings);
            const duplicateCount = dataRows.length - uniqueRows.size;
            
            if (duplicateCount > 0) {
                issues.push({
                    type: duplicateCount > dataRows.length * 0.2 ? 'warning' : 'info',
                    title: '🔂 重复数据行',
                    content: `发现 ${duplicateCount} 行完全重复的数据。`,
                    detail: '重复数据可能影响统计分析的准确性'
                });
                suggestions.push('删除重复的数据行');
            }
            
            // 9. 检测单列数据（只有一列有数据）
            const nonEmptyCols = colEmptyCounts.filter(c => c < dataRows.length).length;
            if (nonEmptyCols === 1 && colCount > 1) {
                issues.push({
                    type: 'critical',
                    title: '⚠️ 数据结构异常',
                    content: '只有一列包含数据，其他列均为空。',
                    detail: '这可能是由于数据格式错误或解析问题导致的'
                });
                suggestions.push('检查原始文件格式，确保数据正确分隔');
            }
            
            // 10. 检测行长度不一致
            const rowLengths = data.map(row => row.length);
            const uniqueLengths = new Set(rowLengths);
            if (uniqueLengths.size > 1) {
                issues.push({
                    type: 'info',
                    title: '📏 行长度不一致',
                    content: `行长度不一致，范围从 ${Math.min(...rowLengths)} 到 ${Math.max(...rowLengths)} 列。`,
                    detail: '这可能导致数据错位问题'
                });
                suggestions.push('确保每行数据的列数一致');
            }
            
            // 如果没有发现问题
            if (issues.length === 0) {
                issues.push({
                    type: 'success',
                    title: '✅ 表格质量良好',
                    content: '未发现明显的表格质量问题，数据格式规范。',
                    detail: ''
                });
            }
            
            // 计算质量评分（严格版）
            let score = 100;
            score -= unnamedCols.length * 15;
            score -= emptyRows.length * 5;
            score -= emptyRate * 50;
            score -= emptyCols.length * 10;
            score -= headerRowIndex * 8;
            score -= duplicates.length * 8;
            score -= duplicateCount * 3;
            score -= typeIssues.length * 3;
            if (uniqueLengths.size > 1) score -= 5;
            if (nonEmptyCols === 1 && colCount > 1) score -= 30;
            score = Math.max(0, Math.min(100, score));
            
            // 显示文件信息
            document.getElementById('fileInfo').innerHTML = `
                <span class="file-name">📄 ${file.name}</span>
                <span class="file-meta">
                    大小: ${(file.size / 1024).toFixed(2)} KB | 
                    行数: ${rowCount} | 
                    列数: ${colCount}
                </span>
            `;
            
            // 显示评分
            const scoreCircle = document.getElementById('scoreCircle');
            const scoreValue = document.getElementById('scoreValue');
            const scoreLabel = document.getElementById('scoreLabel');
            const progressFill = document.getElementById('progressFill');
            const scoreCard = document.querySelector('.score-card');
            
            scoreValue.textContent = Math.round(score);
            progressFill.style.width = score + '%';
            
            let scoreClass, cardClass, scoreText;
            if (score >= 95) {
                scoreClass = 'score-excellent';
                cardClass = 'excellent';
                progressFill.className = 'progress-fill progress-excellent';
                scoreText = '优秀 - 表格质量非常好';
            } else if (score >= 80) {
                scoreClass = 'score-good';
                cardClass = 'good';
                progressFill.className = 'progress-fill progress-good';
                scoreText = '良好 - 表格质量较好，有少量问题';
            } else if (score >= 60) {
                scoreClass = 'score-warning';
                cardClass = 'warning';
                progressFill.className = 'progress-fill progress-warning';
                scoreText = '一般 - 表格存在一些问题，建议优化';
            } else if (score >= 40) {
                scoreClass = 'score-poor';
                cardClass = 'poor';
                progressFill.className = 'progress-fill progress-poor';
                scoreText = '较差 - 表格存在较多问题，需要优化';
            } else {
                scoreClass = 'score-critical';
                cardClass = 'critical';
                progressFill.className = 'progress-fill progress-critical';
                scoreText = '严重 - 表格质量很差，必须优化';
            }
            
            scoreCircle.className = 'score-circle ' + scoreClass;
            scoreCard.className = 'score-card ' + cardClass;
            scoreLabel.textContent = scoreText;
            
            // 显示问题列表
            const issuesGrid = document.getElementById('issuesGrid');
            issuesGrid.innerHTML = issues.map(issue => `
                <div class="issue-card ${issue.type}">
                    <div class="issue-title">
                        <span class="issue-icon">${issue.title.split(' ')[0]}</span>
                        ${issue.title.split(' ').slice(1).join(' ')}
                    </div>
                    <div class="issue-content">${issue.content}</div>
                    ${issue.detail ? `<div class="issue-detail">${issue.detail}</div>` : ''}
                </div>
            `).join('');
            
            // 显示建议
            if (suggestions.length > 0) {
                const uniqueSuggestions = [...new Set(suggestions)];
                document.getElementById('suggestionBox').style.display = 'block';
                document.getElementById('suggestionList').innerHTML = uniqueSuggestions.map(s => `<li>${s}</li>`).join('');
            } else {
                document.getElementById('suggestionBox').style.display = 'none';
            }
            
            // 显示预览表格
            const previewTable = document.getElementById('previewTable');
            const previewRows = data.slice(headerRowIndex, Math.min(headerRowIndex + 11, data.length));
            
            let tableHTML = '<thead><tr>';
            headers.forEach((h, i) => {
                const isUnnamed = String(h || '').includes('Unnamed') || h === '';
                tableHTML += `<th class="${isUnnamed ? 'unnamed' : ''}">${h || `列${i + 1}`}</th>`;
            });
            tableHTML += '</tr></thead><tbody>';
            
            previewRows.slice(1).forEach(row => {
                tableHTML += '<tr>';
                headers.forEach((_, i) => {
                    const cell = row[i];
                    const isEmpty = cell === '' || cell === null || cell === undefined;
                    const isUnnamed = String(headers[i] || '').includes('Unnamed') || headers[i] === '';
                    tableHTML += `<td class="${isEmpty ? 'empty-cell' : ''} ${isUnnamed ? 'unnamed' : ''}">${isEmpty ? '(空)' : String(cell).substring(0, 50)}</td>`;
                });
                tableHTML += '</tr>';
            });
            
            tableHTML += '</tbody>';
            previewTable.innerHTML = tableHTML;
        }
    </script>
